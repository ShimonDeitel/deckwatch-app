name: Deckwatch
options:
  bundleIdPrefix: com.shimondeitel.deckwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Deckwatch:
    type: application
    platform: iOS
    sources:
      - path: Deckwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.deckwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Deckwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DeckwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DeckwatchTests
      - path: Deckwatch.storekit
    dependencies:
      - target: Deckwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.deckwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DeckwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DeckwatchUITests
    dependencies:
      - target: Deckwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.deckwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Deckwatch:
    build:
      targets:
        Deckwatch: all
        DeckwatchTests: [test]
        DeckwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Deckwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Deckwatch.storekit
      targets:
        - DeckwatchTests
        - DeckwatchUITests
    archive:
      config: Release
